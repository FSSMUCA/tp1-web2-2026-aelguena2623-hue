<body>
    <h1>Exercice 2 : Variables avec let</h1>
    <script>
        let prenom = "Mariem";
        let age = 20;
        let ville = "Marrakech";

        console.log("Prénom :", prenom);
        console.log("Âge initial :", age);
        console.log("Ville :", ville);

        
        age = age + 1;
        console.log("Nouvel âge après anniversaire :", age);
        console.log("Je m'appelle " + prenom + " et j'ai " + age + " ans.");
    </script>
</body>
